<!DOCTYPE html>
<html>
<head>
    <title>Drinks - McDonald's</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="images/logo.png" alt="McDonald's Logo" class="logo">
    <h1>McDonald's Philippines</h1>

    <nav>
        <a href="index.html">Main Course</a>
        <a href="drinks.html">Drinks</a>
        <a href="dessert.html">Dessert</a>
    </nav>
</header>

<section class="menu">
    <h2>Drinks</h2>

    <div class="item">
        <img src="images/coke.jpg" alt="Coke Medium">
        <p>Coke (Medium) - ₱59</p>
        Quantity: <input type="number" id="item1" value="0" min="0">
    </div>

    <div class="item">
        <img src="images/icetea.avif" alt="Iced Tea">
        <p>Iced Tea - ₱65</p>
        Quantity: <input type="number" id="item2" value="0" min="0">
    </div>

    <div class="item">
        <img src="images/icecoffee.avif" alt="McCafe Iced Coffee">
        <p>McCafe Iced Coffee - ₱95</p>
        Quantity: <input type="number" id="item3" value="0" min="0">
    </div>

    <h3>Enter Age:</h3>
    <input type="number" id="age" placeholder="Enter your age">

    <button onclick="computeTotal(59,65,95)">Compute Total</button>

    <div class="result">
        <p>Original Total: ₱<span id="original"></span></p>
        <p>Discount (12%): ₱<span id="discount"></span></p>
        <p><strong>Final Payable: ₱<span id="final"></span></strong></p>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
